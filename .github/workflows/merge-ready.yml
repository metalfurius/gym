name: Merge Ready Contract

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: merge-ready-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint ratchet
        run: npm run lint:ratchet

      - name: Run Prettier format check
        run: npm run format:check

      - name: Run app journey tests
        run: npm run test:app

      - name: Run offline recovery/retry gate
        run: npm run test:app:offline

      - name: Fail on skipped tests
        run: npm run test:no-skips

      - name: Run staged coverage gate
        run: npm run test:coverage:gate

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"

  merge-ready:
    name: merge-ready
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: ${{ always() }}

    steps:
      - name: Evaluate merge contract
        run: |
          QUALITY_RESULT="${{ needs.quality.result }}"
          SECURITY_RESULT="${{ needs.security.result }}"

          echo "quality=$QUALITY_RESULT"
          echo "security=$SECURITY_RESULT"

          if [ "$QUALITY_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "::error::merge-ready failed because one or more required jobs did not succeed."
            exit 1
          fi

          echo "merge-ready passed."
